<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduDash</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body.login-body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .login-logo {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 16px;
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text-dark);
            background: #f8fafc;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        .input-group i {
            position: absolute;
            left: 14px;
            top: 36px;
            color: var(--text-muted);
            font-size: 18px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            display: none;
            font-weight: 500;
            background: var(--danger-light);
            padding: 8px;
            border-radius: 6px;
        }
        
        /* Dark mode aesthetics */
        body.dark-mode.login-body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        body.dark-mode .login-container {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        body.dark-mode .input-group input {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(255,255,255,0.1);
            color: #f8fafc;
        }
        body.dark-mode .input-group input:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.25);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container shadow-hover">
        <i class="ph-fill ph-graduation-cap login-logo"></i>
        <div class="login-title">Welcome to EduDash</div>
        <div class="login-subtitle">Please sign in to securely access your portal</div>
        
        <form id="login-form">
            <div class="input-group">
                <label>Username</label>
                <i class="ph ph-user"></i>
                <input type="text" id="username" placeholder="dvkp2006" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <i class="ph ph-lock"></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Secure Login <i class="ph ph-arrow-right"></i></button>
            <div class="error-msg" id="error-msg"><i class="ph-fill ph-warning-circle"></i> Invalid username or password</div>
        </form>
    </div>

    <script>
        // Check global theme preference for continuity
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // Handle Login Submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const container = document.querySelector('.login-container');
            
            // Validate rigid credentials
            if (user === 'dvkp2006' && pass === 'dvkp2006@') {
                localStorage.setItem('isLoggedIn', 'true');
                // Cleanly route into the robust dashboard
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                // Trigger visual feedback error bounce
                container.style.animation = 'none';
                setTimeout(() => {
                    container.style.animation = 'shake 0.4s ease';
                }, 10);
            }
        });
    </script>
</body>
</html>
